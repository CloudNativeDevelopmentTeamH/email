services:
  queue:
    container_name: email-queue
    image: rabbitmq:4.0-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER?missing rabbitmq user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD?missing rabbitmq password}
    ports:
      - "${RABBITMQ_PORT?missing rabbitmq port}:5672"
      - "${RABBITMQ_UI_PORT?missing rabbitmq ui port}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  email:
    build: .
    env_file: .env
    depends_on:
      queue:
        condition: service_healthy
